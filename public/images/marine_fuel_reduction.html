<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Marine Tugboats — ~5% Fuel Reduction (Rentar Fuel Catalyst)</title>
<style>
  html,body{margin:0;background:transparent;}
  .mar-stage{position:relative;width:100%;max-width:1000px;margin:0 auto;aspect-ratio:50/27;
    border-radius:4px;overflow:hidden;background:#24404f;}
  .mar-stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
</style></head><body>
<div class="mar-stage">
  <canvas id="marCv" width="1000" height="540" role="img"
    aria-label="Animation: a marine tugboat on water. Its funnel exhaust drops from a dense baseline plume to a light plume with the Rentar fuel catalyst, alongside an approximately 5 percent fuel-efficiency gain measured by fuel flow meters on two tugboats."></canvas>
</div>
<script>
(function(){
  var x=document.getElementById('marCv'), c; if(!x) return; c=x.getContext('2d'); x=c;
  var W=1000,H=540,t=0,parts=[],waterTop=424;
  function rr(a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
  var funX=316,funY=232;
  function tug(oy){
    x.save();x.translate(0,oy);
    x.fillStyle='#22333d';
    x.beginPath();x.moveTo(165,388);x.lineTo(170,358);x.lineTo(430,350);x.lineTo(452,372);x.lineTo(438,414);x.lineTo(192,418);x.closePath();x.fill();
    x.strokeStyle='#c4e000';x.lineWidth=2;x.beginPath();x.moveTo(176,402);x.lineTo(432,396);x.stroke();
    x.fillStyle='#2c3f4a';rr(230,352,150,8,2);x.fill();
    x.fillStyle='#dbe4e9';rr(238,300,120,54,3);x.fill();
    x.fillStyle='#c2ced4';rr(238,300,120,54,3);x.fill();x.fillStyle='#dbe4e9';rr(238,300,110,54,3);x.fill();
    x.fillStyle='#e8eef1';rr(266,270,74,32,3);x.fill();
    x.fillStyle='#16323f';rr(272,278,16,14,1);x.fill();rr(296,278,16,14,1);x.fill();rr(320,278,16,14,1);x.fill();
    rr(250,312,14,14,1);x.fill();rr(274,312,14,14,1);x.fill();rr(298,312,14,14,1);x.fill();rr(322,312,14,14,1);x.fill();
    x.strokeStyle='#8b9aa2';x.lineWidth=2;x.beginPath();x.moveTo(283,270);x.lineTo(283,236);x.stroke();
    x.fillStyle='#2a3a44';rr(300,234,32,44,3);x.fill();
    x.fillStyle='#c4e000';rr(300,244,32,9,1);x.fill();
    x.fillStyle='#1a2830';x.beginPath();x.moveTo(430,352);x.lineTo(452,372);x.lineTo(440,392);x.lineTo(430,388);x.closePath();x.fill();
    x.restore();
  }
  function waves(){
    var g=x.createLinearGradient(0,waterTop,0,H);g.addColorStop(0,'#1d3646');g.addColorStop(1,'#122430');
    x.fillStyle=g;x.fillRect(0,waterTop,W,H-waterTop);
    var lines=[[waterTop+4,'rgba(196,224,0,.10)',3,90,0.05],[waterTop+16,'rgba(255,255,255,.06)',4,120,0.04],[waterTop+34,'rgba(255,255,255,.04)',5,150,0.03]];
    for(var i=0;i<lines.length;i++){var L=lines[i];x.strokeStyle=L[1];x.lineWidth=1.5;x.beginPath();
      for(var px=0;px<=W;px+=8){var py=L[0]+L[2]*Math.sin(px/L[3]+t*L[4]);if(px===0)x.moveTo(px,py);else x.lineTo(px,py);}x.stroke();}
  }
  function frameDraw(){
    t++;
    var g=x.createLinearGradient(0,0,0,waterTop);g.addColorStop(0,'#2f4c5e');g.addColorStop(1,'#284657');
    x.fillStyle=g;x.fillRect(0,0,W,waterTop);
    x.textBaseline='alphabetic';x.textAlign='left';
    x.fillStyle='#9fb4c0';x.font='14px ui-sans-serif,system-ui,sans-serif';
    x.save();x.letterSpacing='2px';x.fillText('MARINE · ADANI, INDIAN WATERS',54,50);x.restore();
    x.fillStyle='#eef3f6';x.font='500 34px ui-sans-serif,system-ui,sans-serif';x.fillText('~5% gain in fuel efficiency',54,90);
    x.textAlign='right';x.fillStyle='#eef3f6';x.font='500 20px ui-sans-serif,system-ui,sans-serif';
    x.save();x.letterSpacing='3px';x.fillText('RENTAR',946,52);x.restore();
    x.fillStyle='#c4e000';x.fillRect(902,60,44,2);

    var loop=t%520, baseline=loop<170, prog=Math.min(1,Math.max(0,(loop-170)/100));prog=1-Math.pow(1-prog,3);
    var bob=3*Math.sin(t*0.04);
    var rate=baseline?2:9;
    if(t%rate===0){parts.push({x:funX+(Math.random()*8-4),y:funY+bob,vx:0.5+Math.random()*0.7,vy:-(0.8+Math.random()*0.7),life:1,r:baseline?(5+Math.random()*4):(3+Math.random()*2),dark:baseline});}
    tug(bob);
    for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy*=0.995;p.life-=baseline?0.006:0.011;p.r+=0.15;
      if(p.life<=0){parts.splice(i,1);continue;}
      x.globalAlpha=Math.max(0,p.life*(p.dark?0.55:0.3));
      x.fillStyle=p.dark?'#20282c':'#aebfc7';x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fill();}
    x.globalAlpha=1;
    waves();

    x.textAlign='center';x.font='14px ui-sans-serif,system-ui,sans-serif';
    if(baseline){x.fillStyle='#c98f8f';x.save();x.letterSpacing='1px';x.fillText('BASELINE FUEL BURN',300,150);x.restore();}
    else{x.fillStyle='#c4e000';x.save();x.letterSpacing='1px';x.fillText('WITH RENTAR FUEL CATALYST',300,150);x.restore();}

    x.strokeStyle='rgba(255,255,255,.08)';x.beginPath();x.moveTo(548,128);x.lineTo(548,404);x.stroke();
    x.textAlign='left';
    x.fillStyle='#c4e000';x.beginPath();x.moveTo(600,168);x.lineTo(616,168);x.lineTo(608,182);x.closePath();x.fill();
    x.fillStyle='#eef3f6';x.font='500 48px ui-sans-serif,system-ui,sans-serif';x.fillText('−~'+Math.round(5*prog)+'%',626,192);
    x.fillStyle='#9fb4c0';x.font='15px ui-sans-serif,system-ui,sans-serif';x.fillText('diesel fuel consumption',628,216);

    x.textAlign='center';x.fillStyle='#7f97a4';x.font='12px ui-sans-serif,system-ui,sans-serif';
    x.save();x.letterSpacing='0.5px';
    x.fillText('Consistent fuel savings across marine vessels, Indian waters · physical fuel-flow meters, parallel test and control engines',W/2,514);
    x.restore();
    requestAnimationFrame(frameDraw);
  }
  frameDraw();
})();
</script></body></html>
