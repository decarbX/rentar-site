<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VALE Itabira — Verified GHG Reduction (Rentar Fuel Catalyst)</title>
<style>
  html,body{margin:0;background:transparent;}
  .vale-stage{position:relative;width:100%;max-width:1000px;margin:0 auto;aspect-ratio:50/27;
    border-radius:4px;overflow:hidden;background:#24404f;}
  .vale-stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
</style></head><body>
<div class="vale-stage">
  <canvas id="valeCv" width="1000" height="540" role="img"
    aria-label="Animation: a Caterpillar 793F mining haul truck at the VALE Itabira complex. Its exhaust plume drops from a dense baseline to a light plume with the Rentar fuel catalyst, alongside verified reductions of 3 percent CO2, 18 percent CO, and about 5 percent fuel, tested by an independent third-party lab."></canvas>
</div>
<script>
(function(){
  var cv=document.getElementById('valeCv'); if(!cv) return;
  var x=cv.getContext('2d'); var W=1000,H=540,t=0,parts=[];
  function rr(a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
  var sx=258, sy=196;
  function truck(){
    x.fillStyle='#e3a63a';
    x.beginPath();x.moveTo(150,258);x.lineTo(300,250);x.lineTo(452,212);x.lineTo(452,300);x.lineTo(150,300);x.closePath();x.fill();
    x.fillStyle='#b67f24';x.beginPath();x.moveTo(150,300);x.lineTo(452,300);x.lineTo(452,312);x.lineTo(150,312);x.closePath();x.fill();
    x.fillStyle='#c98f2c';rr(150,300,58,46,3);x.fill();
    x.fillStyle='#16323f';rr(158,308,40,20,2);x.fill();
    x.fillStyle='#20303a';rr(150,346,300,14,2);x.fill();
    x.fillStyle='#3a4a1e';rr(248,200,8,58,2);x.fill();rr(264,200,8,58,2);x.fill();
    var tires=[[360,392,54],[176,400,42]];
    for(var i=0;i<tires.length;i++){var c=tires[i];
      x.fillStyle='#10181d';x.beginPath();x.arc(c[0],c[1],c[2],0,7);x.fill();
      x.fillStyle='#2a3640';x.beginPath();x.arc(c[0],c[1],c[2]*0.5,0,7);x.fill();
      x.fillStyle='#141d23';x.beginPath();x.arc(c[0],c[1],c[2]*0.22,0,7);x.fill();}
    x.strokeStyle='rgba(0,0,0,.18)';x.lineWidth=1;x.beginPath();x.moveTo(300,250);x.lineTo(300,300);x.stroke();
  }
  function frameDraw(){
    t++;
    var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#2f4c5e');g.addColorStop(1,'#223c4b');
    x.fillStyle=g;x.fillRect(0,0,W,H);
    x.strokeStyle='rgba(255,255,255,.05)';x.lineWidth=1;x.beginPath();x.moveTo(60,452);x.lineTo(500,452);x.stroke();
    x.textBaseline='alphabetic';x.textAlign='left';
    x.fillStyle='#9fb4c0';x.font='14px ui-sans-serif,system-ui,sans-serif';
    x.save();x.letterSpacing='2px';x.fillText('MINING · VALE ITABIRA COMPLEX, BRAZIL',54,50);x.restore();
    x.fillStyle='#eef3f6';x.font='500 34px ui-sans-serif,system-ui,sans-serif';x.fillText('Verified reduction in greenhouse gases',54,90);
    x.textAlign='right';x.fillStyle='#eef3f6';x.font='500 20px ui-sans-serif,system-ui,sans-serif';
    x.save();x.letterSpacing='3px';x.fillText('RENTAR',946,52);x.restore();
    x.fillStyle='#c4e000';x.fillRect(902,60,44,2);

    var loop=t%520, baseline=loop<170, prog=Math.min(1,Math.max(0,(loop-170)/100));
    prog=1-Math.pow(1-prog,3);
    var rate=baseline?2:9;
    if(t%rate===0){var spread=baseline?3.2:1.4;
      parts.push({x:sx+(Math.random()*8-4),y:sy,vx:0.5+Math.random()*0.7,vy:-(0.8+Math.random()*0.7),life:1,r:baseline?(5+Math.random()*4):(3+Math.random()*2),dark:baseline});}
    truck();
    for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy*=0.995;p.life-=baseline?0.006:0.011;p.r+=0.15;
      if(p.life<=0){parts.splice(i,1);continue;}
      x.globalAlpha=Math.max(0,p.life*(p.dark?0.55:0.3));
      x.fillStyle=p.dark?'#20282c':'#aebfc7';x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fill();}
    x.globalAlpha=1;

    x.textAlign='center';x.font='14px ui-sans-serif,system-ui,sans-serif';
    if(baseline){x.fillStyle='#c98f8f';x.save();x.letterSpacing='1px';x.fillText('BASELINE EMISSIONS',300,150);x.restore();}
    else{x.fillStyle='#c4e000';x.save();x.letterSpacing='1px';x.fillText('WITH RENTAR FUEL CATALYST',300,150);x.restore();}

    x.strokeStyle='rgba(255,255,255,.08)';x.beginPath();x.moveTo(548,130);x.lineTo(548,430);x.stroke();
    var stats=[['3','greenhouse gas  (CO₂)'],['18','carbon monoxide  (CO)'],['5','diesel fuel use']];
    var yy=[178,272,366];
    for(var s=0;s<3;s++){var val=Math.round(parseInt(stats[s][0])*prog);
      x.textAlign='left';
      x.fillStyle='#c4e000';x.beginPath();x.moveTo(600,yy[s]-18);x.lineTo(614,yy[s]-18);x.lineTo(607,yy[s]-6);x.closePath();x.fill();
      x.fillStyle='#eef3f6';x.font='500 48px ui-sans-serif,system-ui,sans-serif';
      x.fillText((s===2?'−~':'−')+val+'%',628,yy[s]+2);
      x.fillStyle='#9fb4c0';x.font='15px ui-sans-serif,system-ui,sans-serif';x.fillText(stats[s][1],630,yy[s]+24);}

    x.textAlign='center';x.fillStyle='#7f97a4';x.font='12px ui-sans-serif,system-ui,sans-serif';
    x.save();x.letterSpacing='0.5px';
    x.fillText('Independent third-party laboratory · US EPA Methods 7/10/3A · ABNT NBR 12.897 · 2× Caterpillar 793F off-highway trucks',W/2,512);
    x.restore();
    requestAnimationFrame(frameDraw);
  }
  frameDraw();
})();
</script></body></html>
