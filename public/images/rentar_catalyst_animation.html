<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Rentar Fuel Catalyst — Molecular Conditioning</title>
<style>
  html,body{margin:0;background:transparent;}
  .rc-stage{position:relative;width:100%;max-width:1040px;margin:0 auto;aspect-ratio:25/16;
    border-radius:8px;overflow:hidden;background:#081420;}
  .rc-stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
</style>
</head>
<body>
<div class="rc-stage">
  <canvas id="rcCanvas" width="1000" height="640" role="img"
    aria-label="High-tech animation: clustered fuel molecules with bonds flow into the Rentar in-line catalyst, are conditioned, and exit as an energized dispersed fine mist at the injector, with live readouts for molecular dispersion, droplet size and combustion efficiency."></canvas>
</div>
<script>
(function(){
  var cv=document.getElementById('rcCanvas'); if(!cv) return;
  var ctx=cv.getContext('2d');
  var W=1000,H=640,cy=330;
  var inX=130,inW=200,catX=330,catW=330,catExit=catX+catW,outEnd=790,injX=790,sprayEnd=958;
  var clusters=[],fines=[],sprays=[],t=0;
  var hexN=[[0,-13],[12,-6.5],[12,6.5],[0,13],[-12,6.5],[-12,-6.5]];
  function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function bracket(x,y,sx,sy){ctx.beginPath();ctx.moveTo(x+sx*18,y);ctx.lineTo(x,y);ctx.lineTo(x,y+sy*18);ctx.stroke();}
  function frameDraw(){
    t++;
    var bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#0c1c2b');bg.addColorStop(.6,'#0a1826');bg.addColorStop(1,'#060f18');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(79,215,255,.05)';ctx.lineWidth=1;
    for(var gx=0;gx<=W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
    for(var gy=0;gy<=H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
    var sy=30+((t*1.3)%(H-60));ctx.strokeStyle='rgba(79,215,255,.06)';ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(W,sy);ctx.stroke();
    ctx.strokeStyle='rgba(196,224,0,.55)';ctx.lineWidth=1.5;
    bracket(24,24,1,1);bracket(W-24,24,-1,1);bracket(24,H-24,1,-1);bracket(W-24,H-24,-1,-1);
    ctx.textBaseline='alphabetic';
    ctx.fillStyle='#eef4f6';ctx.font='500 48px ui-monospace,Menlo,Consolas,monospace';ctx.textAlign='left';
    ctx.save();ctx.letterSpacing='6px';ctx.fillText('RENTAR',44,72);ctx.restore();
    ctx.fillStyle='#c4e000';ctx.font='24px ui-monospace,Menlo,Consolas,monospace';
    ctx.save();ctx.letterSpacing='3px';ctx.fillText('FUEL CATALYST',46,104);ctx.restore();
    ctx.textAlign='right';ctx.fillStyle='#7fbfd6';ctx.font='24px ui-monospace,Menlo,Consolas,monospace';
    ctx.save();ctx.letterSpacing='2px';ctx.fillText('MOLECULAR CONDITIONING',W-52,74);ctx.restore();
    ctx.fillStyle=(Math.sin(t*0.12)>0)?'#4fd7ff':'rgba(79,215,255,.25)';ctx.beginPath();ctx.arc(W-38,62,4,0,7);ctx.fill();
    ctx.strokeStyle='rgba(20,70,90,.6)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(120,cy);ctx.lineTo(880,cy);ctx.stroke();
    ctx.fillStyle='#20323c';ctx.strokeStyle='#3d5866';ctx.lineWidth=1;rr(inX,cy-16,inW,32,15);ctx.fill();ctx.stroke();
    rr(catExit,cy-16,outEnd-catExit,32,15);ctx.fillStyle='#20323c';ctx.fill();ctx.strokeStyle='#3d5866';ctx.stroke();
    if(t%46===0) clusters.push({x:inX+16,y:cy+(Math.random()*16-8),rot:Math.random()});
    for(var i=clusters.length-1;i>=0;i--){var c=clusters[i];c.x+=1.5;
      if(c.x>=catExit){for(var k=0;k<5;k++) fines.push({x:catExit-6,y:cy+(k-2)*6,ph:Math.random()*6});clusters.splice(i,1);continue;}
      ctx.strokeStyle='rgba(232,147,30,.5)';ctx.lineWidth=1.2;ctx.beginPath();
      for(var b=0;b<6;b++){var a=hexN[b],n=hexN[(b+1)%6];ctx.moveTo(c.x+a[0],c.y+a[1]);ctx.lineTo(c.x+n[0],c.y+n[1]);}
      for(var b2=0;b2<6;b2++){ctx.moveTo(c.x,c.y);ctx.lineTo(c.x+hexN[b2][0],c.y+hexN[b2][1]);}ctx.stroke();
      ctx.fillStyle='#e8931e';for(var d=0;d<6;d++){ctx.beginPath();ctx.arc(c.x+hexN[d][0],c.y+hexN[d][1],3,0,7);ctx.fill();}
      ctx.beginPath();ctx.arc(c.x,c.y,3.4,0,7);ctx.fill();}
    var core=ctx.createLinearGradient(0,cy-46,0,cy+46);core.addColorStop(0,'#33525f');core.addColorStop(.5,'#182a33');core.addColorStop(1,'#0c1a20');
    ctx.fillStyle='#5a7581';rr(catX-9,cy-42,13,84,3);ctx.fill();rr(catExit-4,cy-42,13,84,3);ctx.fill();
    rr(catX,cy-46,catW,92,18);ctx.fillStyle=core;ctx.fill();ctx.strokeStyle='#6f95a3';ctx.lineWidth=1;ctx.stroke();
    ctx.save();rr(catX+2,cy-44,catW-4,88,16);ctx.clip();
    var pulse=0.5+0.5*Math.sin(t*0.06);
    var gg=ctx.createRadialGradient(catX+catW/2,cy,4,catX+catW/2,cy,120);
    gg.addColorStop(0,'rgba(196,224,0,'+(0.28+0.14*pulse)+')');gg.addColorStop(1,'rgba(196,224,0,0)');
    ctx.fillStyle=gg;ctx.fillRect(catX,cy-46,catW,92);
    ctx.strokeStyle='rgba(196,224,0,.22)';ctx.lineWidth=1;
    for(var hx=catX+26;hx<catX+catW-14;hx+=22){ctx.beginPath();ctx.moveTo(hx,cy-36);ctx.lineTo(hx,cy+36);ctx.stroke();}
    var ex=catX+20+((t*3)%(catW-40));ctx.strokeStyle='rgba(79,215,255,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ex,cy-34);ctx.lineTo(ex,cy+34);ctx.stroke();
    ctx.restore();
    ctx.textAlign='center';ctx.fillStyle='#eef4f6';ctx.font='500 28px ui-monospace,Menlo,Consolas,monospace';
    ctx.save();ctx.letterSpacing='2px';ctx.fillText('RENTAR',catX+catW/2,cy-4);ctx.restore();
    ctx.fillStyle='#9bd0dd';ctx.font='18px ui-monospace,Menlo,Consolas,monospace';ctx.fillText('CATALYST CORE',catX+catW/2,cy+24);
    for(var j=fines.length-1;j>=0;j--){var f=fines[j];f.x+=1.9;
      if(f.x>=injX){for(var s=0;s<8;s++) sprays.push({x:injX+8,y:cy,vx:2.2+Math.random()*2.8,vy:(Math.random()-0.5)*3.2,life:1});fines.splice(j,1);continue;}
      ctx.save();ctx.shadowColor='rgba(255,211,107,.9)';ctx.shadowBlur=8;ctx.fillStyle='#ffd36b';
      ctx.beginPath();ctx.arc(f.x,f.y,3,0,7);ctx.fill();ctx.restore();}
    ctx.fillStyle='#33474f';ctx.strokeStyle='#5a7581';ctx.lineWidth=1;rr(injX-9,cy-13,22,26,3);ctx.fill();ctx.stroke();
    ctx.fillStyle='#5a7581';ctx.beginPath();ctx.moveTo(injX+13,cy-9);ctx.lineTo(injX+34,cy);ctx.lineTo(injX+13,cy+9);ctx.closePath();ctx.fill();
    ctx.save();ctx.shadowColor='rgba(255,211,107,.7)';ctx.shadowBlur=5;
    for(var m=sprays.length-1;m>=0;m--){var p=sprays[m];p.x+=p.vx;p.y+=p.vy;p.life-=0.012;
      if(p.life<=0||p.x>sprayEnd){sprays.splice(m,1);continue;}
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='#ffd36b';ctx.beginPath();ctx.arc(p.x,p.y,1.6,0,7);ctx.fill();}
    ctx.restore();ctx.globalAlpha=1;
    ctx.textAlign='center';ctx.font='22px ui-monospace,Menlo,Consolas,monospace';
    ctx.fillStyle='#e8931e';ctx.fillText('BEFORE', inX+inW/2, cy-62);ctx.fillStyle='#6f8b97';ctx.fillText('clustered · bonded', inX+inW/2, cy+78);
    ctx.fillStyle='#ffd36b';ctx.fillText('AFTER', 800, cy-62);ctx.fillStyle='#6f8b97';ctx.fillText('dispersed · atomized', 812, cy+78);
    var meters=[['MOLECULAR DISPERSION',0.9+0.05*Math.sin(t*0.05),'#c4e000',1],
                ['DROPLET SIZE',0.2+0.05*Math.sin(t*0.05+1),'#e8931e',-1],
                ['COMBUSTION EFFICIENCY',0.88+0.05*Math.sin(t*0.05+2),'#4fd7ff',1]];
    var mx=[210,500,790];
    for(var q=0;q<3;q++){var cxm=mx[q],val=meters[q][1];
      ctx.textAlign='center';ctx.fillStyle='#8fb0bc';ctx.font='16px ui-monospace,Menlo,Consolas,monospace';
      ctx.save();ctx.letterSpacing='1px';ctx.fillText(meters[q][0]+(meters[q][3]>0?'  ▲':'  ▼'),cxm,540);ctx.restore();
      ctx.fillStyle='rgba(255,255,255,.08)';rr(cxm-80,550,160,7,3.5);ctx.fill();
      ctx.fillStyle=meters[q][2];rr(cxm-80,550,160*val,7,3.5);ctx.fill();}
    ctx.textAlign='center';ctx.fillStyle='#6f8b97';ctx.font='16px ui-monospace,Menlo,Consolas,monospace';
    ctx.save();ctx.letterSpacing='1px';ctx.fillText('33 PATENTS   ·   1M+ ENGINE CONFIGURATIONS   ·   PASSIVE, IN-LINE, NO MOVING PARTS',W/2,600);ctx.restore();
    requestAnimationFrame(frameDraw);
  }
  for(var z=0;z<3;z++) clusters.push({x:inX+30+z*95,y:cy,rot:0});
  frameDraw();
})();
</script>
</body>
</html>
